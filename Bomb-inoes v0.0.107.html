<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Bomb-inoes</title>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    html { overflow-x: hidden; }
    body {
      height: 100dvh; overflow: hidden; overflow-x: hidden;
      display: flex; flex-direction: column;
      overscroll-behavior: none;
      font-family: system-ui, -apple-system, sans-serif;
      /* safe-area: push content away from notch/home-bar */
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }
    .hscroll { overflow-x: auto; overflow-y: hidden; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .hscroll::-webkit-scrollbar { display: none; }
    .tile {
      display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0;
      min-width: 44px; min-height: 44px;
      background: #fef9ef; border-radius: 7px; border: 2px solid #c8b98a;
      box-shadow: 0 2px 6px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.4);
      cursor: pointer; -webkit-user-select: none; user-select: none;
      transition: transform .12s, box-shadow .12s;
    }
    .tile.sel { transform: translateY(-10px); box-shadow: 0 10px 24px rgba(0,0,0,.5), 0 0 0 3px #fbbf24; }
    .tile.dim { opacity: .4; cursor: default; pointer-events: none; }
    .tile.dead { cursor: default; pointer-events: none; }
    .pips { display: grid; grid-template-columns: repeat(3,1fr); grid-template-rows: repeat(3,1fr); flex-shrink: 0; padding: 3px; }
    .pip { border-radius: 50%; background: #1e293b; margin: auto; }
    .seam-h { background: #c8b98a; width: 2px; align-self: stretch; flex-shrink: 0; }
    .seam-v { background: #c8b98a; height: 2px; width: 80%; flex-shrink: 0; align-self: center; }
    .act-btn {
      padding: 0 22px; height: 44px; min-width: 44px;
      border-radius: 12px; font-weight: 700; font-size: 14px;
      color: white; border: none; cursor: pointer; flex-shrink: 0;
      transition: transform .1s; display: inline-flex; align-items: center; justify-content: center;
    }
    .act-btn:active { transform: scale(.91); }
    .end-label { color: rgba(74,222,128,.6); font-size: 12px; font-weight: 700; padding: 0 6px; flex-shrink: 0; min-width: 20px; text-align: center; }

    /* ── Landscape: tighten vertical spacing so everything fits ── */
    @media (orientation: landscape) and (max-height: 500px) {
      .tile { min-height: 36px; }
      #acts { min-height: 44px !important; padding-top: 2px !important; padding-bottom: 2px !important; }
      #board { padding-top: 6px !important; padding-bottom: 6px !important; }
      .flex-shrink-0.px-3.pt-2.pb-1 { padding-top: 4px !important; padding-bottom: 2px !important; }
      .flex-shrink-0.px-3.pt-1.pb-2 { padding-top: 2px !important; padding-bottom: 4px !important; }
      .text-xs.text-green-400\/50 { display: none; }
      #status { padding-top: 2px !important; padding-bottom: 2px !important; }
      .flex.justify-between { padding-top: 2px !important; padding-bottom: 2px !important; }
      /* Bug fix: scope p[style] hide to game container only, not the start overlay */
      #game-container p[style] { display: none; }
    }

    /* ── Start Menu ── */
    :root {
        --color-bg-dark:  #052e16;
        --color-panel:    #14532d;
        --color-primary:  #4ade80;
        --color-accent:   #fbbf24;
        --color-glow:     #bbf7d0;
        --color-shadow:   #022c11;
    }
    .hidden { display: none !important; }
    .btn-pixel { padding: 4px 12px; text-transform: uppercase; font-weight: bold; border: 4px solid var(--color-primary); background: var(--color-panel); box-shadow: inset -2px -2px 0px var(--color-shadow); cursor: pointer; }
    .btn-pixel:hover { background: var(--color-primary); color: var(--color-bg-dark); }
    .menu-scroll { background: linear-gradient(180deg, var(--color-bg-dark) 0%, var(--color-panel) 45%, var(--color-panel) 55%, var(--color-bg-dark) 100%); border: 6px solid var(--color-primary); box-shadow: 0 0 6px 2px color-mix(in srgb, var(--color-primary) 55%, transparent), 0 0 28px 4px color-mix(in srgb, var(--color-primary) 28%, transparent), 0 0 70px color-mix(in srgb, var(--color-primary) 12%, transparent), inset 0 0 40px rgba(0,0,0,0.45); width: 640px; max-width: 92vw; max-height: 92vh; overflow-y: auto; scrollbar-width: none; }
    .menu-scroll::-webkit-scrollbar { display: none; }
    .start-menu-btn { display: flex; align-items: center; gap: 12px; width: 100%; padding: 14px 24px; font-family: 'VT323', monospace; font-size: 1.45rem; text-transform: uppercase; letter-spacing: 0.07em; color: var(--color-glow); background: transparent; border: none; border-bottom: 2px solid var(--color-shadow); cursor: pointer; text-shadow: 2px 2px 0 var(--color-shadow); text-align: left; transition: background 0.12s, padding-left 0.12s; }
    .start-menu-btn:hover { background: color-mix(in srgb, var(--color-primary) 10%, transparent); color: #fff; padding-left: 28px; }
    .start-menu-btn:last-child { border-bottom: none; }
    .start-back-btn { font-family: 'VT323', monospace; font-size: 1.1rem; text-transform: uppercase; padding: 6px 14px; color: var(--color-primary); background: transparent; border: 4px solid var(--color-primary); cursor: pointer; letter-spacing: 0.05em; }
    .start-back-btn:hover { background: var(--color-primary); color: var(--color-bg-dark); }
    .subpanel-header { display: flex; align-items: center; gap: 16px; padding: 16px; background: var(--color-bg-dark); position: sticky; top: 0; z-index: 10; border-bottom: 6px solid var(--color-primary); }
    .subpanel-header h2 { font-size: 1.5rem; color: var(--color-glow); font-weight: bold; text-transform: uppercase; font-style: italic; }
    .subpanel-footer { position: sticky; bottom: 0; height: 6px; background: var(--color-bg-dark); }
  </style>
</head>
<body class="bg-green-900 text-white">

    <div id="start-overlay" class="fixed inset-0 z-[200] flex items-center justify-center" style="background:#000;">
        <div id="start-main" class="menu-scroll relative z-10">
            <div class="text-center pt-4 pb-4 px-6" style="border-bottom: 4px solid var(--color-shadow);">
                <div style="min-height:180px; display:flex; align-items:center; justify-content:center;"><h1 style="font-family:'VT323',monospace; font-size:clamp(2.5rem,10vw,5rem); color:var(--color-glow); text-shadow:3px 3px 0 var(--color-shadow); text-transform:uppercase; letter-spacing:0.12em; line-height:1.1;">BOMB-INOES</h1></div>
                <div class="flex items-center justify-center gap-3 mt-2"><div class="flex-grow h-px" style="background:linear-gradient(to right,transparent,var(--color-primary))"></div><span style="font-size:1rem; color:var(--color-primary); text-transform:uppercase; letter-spacing:0.4em;">DOUBLE OR DIE</span><div class="flex-grow h-px" style="background:linear-gradient(to left,transparent,var(--color-primary))"></div></div>
            </div>
            <div class="flex flex-col">
                <button class="start-menu-btn" onclick="startGame()"><span>Play</span><span class="ml-auto text-base opacity-40 font-sans">↵</span></button>
                <button class="start-menu-btn" onclick="showStartPanel('howtoplay')"><span>How to Play</span><span class="ml-auto text-base opacity-40 font-sans">›</span></button>
                <button class="start-menu-btn" onclick="showStartPanel('highscores')"><span>High Scores</span><span class="ml-auto text-base opacity-40 font-sans">›</span></button>
                <button class="start-menu-btn" onclick="showStartPanel('patchnotes')"><span>Patch Notes</span><span class="ml-auto text-base opacity-40 font-sans">›</span></button>
                <button class="start-menu-btn" onclick="showStartPanel('settings')"><span>Settings</span><span class="ml-auto text-base opacity-40 font-sans">›</span></button>
            </div>
            <p style="font-size:10px; text-transform:uppercase; letter-spacing:0.35em; color:var(--color-primary); opacity:0.6; text-align:center; padding:12px 0; border-top: 1px solid var(--color-shadow);">&copy; Tacticon Studios 2026 &nbsp;&mdash;&nbsp; v0.0.107</p>
        </div>
        <div id="start-howtoplay" class="menu-scroll hidden relative z-10"><div class="subpanel-header"><button class="start-back-btn" onclick="showStartPanel('main')">← Back</button><h2>How to Play</h2></div><div class="p-5 text-[12px]"><p style="color:var(--color-primary);opacity:0.5;text-align:center;margin-top:32px">Coming soon.</p></div><div class="subpanel-footer"></div></div>
        <div id="start-highscores" class="menu-scroll hidden relative z-10"><div class="subpanel-header"><button class="start-back-btn" onclick="showStartPanel('main')">← Back</button><h2>High Scores</h2></div><div class="p-5" id="highscore-list"><p style="text-align:center;color:var(--color-primary);opacity:0.5;font-size:0.875rem;margin-top:32px">No scores recorded yet.</p></div><div class="subpanel-footer"></div></div>
        <div id="start-patchnotes" class="menu-scroll hidden relative z-10"><div class="subpanel-header"><button class="start-back-btn" onclick="showStartPanel('main')">← Back</button><h2>Patch Notes</h2></div><div id="patchnotes-list" class="p-5 text-[12px] space-y-5"></div><div class="subpanel-footer"></div></div>
        <div id="start-settings" class="menu-scroll hidden relative z-10"><div class="subpanel-header"><button class="start-back-btn" onclick="showStartPanel('main')">← Back</button><h2>Settings</h2></div><div class="p-6 space-y-6"><div><h3 style="color:var(--color-glow);text-transform:uppercase;font-weight:bold;font-size:0.875rem;border-bottom:1px solid var(--color-shadow);padding-bottom:8px;margin-bottom:16px;letter-spacing:0.1em">Audio</h3><div class="flex items-center justify-between py-2" style="border-bottom:1px solid var(--color-shadow)"><span>SFX Volume</span><div class="flex items-center gap-3"><input type="range" id="vol-slider" min="0" max="100" value="100" oninput="updateVolume(this.value)" style="accent-color:var(--color-primary);width:120px"><span id="vol-val" style="color:var(--color-glow);width:40px;text-align:right">100%</span></div></div><div class="flex items-center justify-between py-2"><span>Sound Effects</span><button id="sfx-toggle" onclick="toggleSFX()" class="btn-pixel text-sm px-4">ON</button></div></div></div><div class="subpanel-footer"></div></div>
    </div>

  <!-- Bug fix: removed class="hidden" so .hidden's display:none !important cannot block style="display:flex" -->
  <div id="game-container" class="w-full h-full" style="display:none; flex-direction:column; height:100dvh;">
    <div id="status" class="text-center py-2 text-sm font-bold tracking-wider bg-black/25 flex-shrink-0"></div>

    <!-- P2 hand -->
    <div class="flex-shrink-0 px-3 pt-2 pb-1">
      <div class="text-xs text-green-400/50 text-center mb-1 tracking-widest">PLAYER 2</div>
      <div class="hscroll"><div id="opp" class="flex gap-2 px-2 pb-1" style="min-width:max-content"></div></div>
    </div>

    <!-- Info row -->
    <div class="flex justify-between text-xs text-green-300/40 px-5 py-1 flex-shrink-0">
      <span>Boneyard: <span id="bc">0</span></span>
      <span id="sc">0 — 0</span>
      <span id="daily-seed-display" style="opacity:0.45;font-size:10px;letter-spacing:0.05em;align-self:center;"></span>
    </div>

    <!-- Board -->
    <div class="flex-1 flex items-center min-h-0">
      <div id="bscroll" class="hscroll w-full">
        <div id="board" class="flex items-center py-4 px-6" style="min-width:max-content; gap:3px;"></div>
      </div>
    </div>

    <!-- Actions -->
    <div id="acts" class="flex gap-2 justify-center px-4 py-2 flex-shrink-0" style="min-height:52px; align-items:center;"></div>

    <!-- P1 hand -->
    <div class="flex-shrink-0 px-3 pt-1 pb-2">
      <div class="text-xs text-green-400/50 text-center mb-1 tracking-widest">YOUR HAND</div>
      <div class="hscroll"><div id="p1" class="flex gap-2 px-2 pb-1" style="min-width:max-content"></div></div>
    </div>

    <p style="font-size:10px;text-align:center;opacity:.35;padding:6px;letter-spacing:.3em;text-transform:uppercase;">&copy; Tacticon Studios 2026 &mdash; v0.0.107</p>
  </div>

<script>
    const PATCH_NOTES = [];
    const HS_KEY = 'bombinoes_hs';
    function saveScore(score, label='') { try { const scores = getScores(); scores.push({ score, label, date: new Date().toLocaleDateString() }); scores.sort((a,b)=>b.score-a.score); scores.splice(10); localStorage.setItem(HS_KEY, JSON.stringify(scores)); } catch(e) {} }
    function getScores() { try { return JSON.parse(localStorage.getItem(HS_KEY)) || []; } catch { return []; } }
    function renderHighScores() { const el = document.getElementById('highscore-list'); const scores = getScores(); const primary = getComputedStyle(document.documentElement).getPropertyValue('--color-primary').trim(); const glow = getComputedStyle(document.documentElement).getPropertyValue('--color-glow').trim(); const shadow = getComputedStyle(document.documentElement).getPropertyValue('--color-shadow').trim(); if (!scores.length) { el.innerHTML = `<p style="text-align:center;color:${primary};opacity:0.5;font-size:0.875rem;margin-top:32px">No scores recorded yet.</p>`; return; } el.innerHTML = scores.map((s,i) => `<div style="display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid ${shadow};font-size:0.875rem"><span style="color:${primary};width:24px;text-align:right">${i+1}.</span><span style="flex:1;color:#fff">${s.label||'—'}</span><span style="color:${glow};font-weight:bold">${s.score}</span><span style="color:${primary};opacity:0.5;font-size:0.75rem">${s.date}</span></div>`).join(''); }
    function renderPatchNotes() { const el = document.getElementById('patchnotes-list'); const primary = getComputedStyle(document.documentElement).getPropertyValue('--color-primary').trim(); const glow = getComputedStyle(document.documentElement).getPropertyValue('--color-glow').trim(); if (!PATCH_NOTES.length) { el.innerHTML = `<p style="text-align:center;color:${primary};opacity:0.5;font-size:0.875rem;margin-top:32px">No patch notes yet.</p>`; return; } el.innerHTML = PATCH_NOTES.map(p => `<div><div style="display:flex;align-items:baseline;gap:12px;margin-bottom:4px"><span style="color:${glow};font-weight:bold">${p.v}</span><span style="color:${primary};opacity:0.6;font-size:10px">${p.date}</span></div><ul style="margin:0;padding:0;list-style:none">${p.notes.map(n=>`<li style="color:#d1d5db">• ${n}</li>`).join('')}</ul></div>`).join(''); }
    const PANELS = ['main','howtoplay','settings','highscores','patchnotes'];
    function showStartPanel(name, fromPopstate=false) { PANELS.forEach(p => { const el = document.getElementById('start-'+p); if (el) el.classList.toggle('hidden', p !== name); }); if (name === 'highscores') renderHighScores(); if (name === 'patchnotes') renderPatchNotes(); if (!fromPopstate && name !== 'main') history.pushState({ panel: name }, ''); }
    window.addEventListener('popstate', function(e) {
        const ov = document.getElementById('start-overlay');
        const gc = document.getElementById('game-container');
        if (!ov) return;
        if (!ov.classList.contains('hidden')) {
            showStartPanel('main', true);
        } else if (gc && gc.style.display !== 'none') {
            gc.style.display = 'none';
            ov.classList.remove('hidden');
            showStartPanel('main', true);
        }
    });
    let sfxEnabled = true;
    function updateVolume(val) { document.getElementById('vol-val').innerText = val + '%'; }
    function toggleSFX() { sfxEnabled = !sfxEnabled; document.getElementById('sfx-toggle').innerText = sfxEnabled ? 'ON' : 'OFF'; }
    function startGame() {
        history.pushState({ panel: 'game' }, '');
        document.getElementById('start-overlay').classList.add('hidden');
        const gc = document.getElementById('game-container');
        gc.style.display = 'flex';
        initGame();
    }

const PIPS = {
  0:[], 1:[[1,1]], 2:[[0,2],[2,0]], 3:[[0,2],[1,1],[2,0]],
  4:[[0,0],[0,2],[2,0],[2,2]], 5:[[0,0],[0,2],[1,1],[2,0],[2,2]],
  6:[[0,0],[0,2],[1,0],[1,2],[2,0],[2,2]]
};

// ── Daily seed for async competitive fairness ─────────────
// Both players on the same calendar day get the same tile distribution.
function getDailySeed() {
  return parseInt(new Date().toISOString().slice(0, 10).replace(/-/g, ''));
}

// mulberry32 — fast, seedable, high-quality 32-bit PRNG
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// Seeded Fisher-Yates shuffle (mutates array in place)
function seededShuffle(arr, rng) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

let G;

const MATCH_ROUNDS = 5;

function newGame() {
  // Carry over match-level state between rounds; reset everything on a fresh match start
  const continuing = G && !G.matchOver;
  const prevSc = continuing ? [...G.sc] : [0, 0];
  const prevPts = continuing ? [...G.pts] : [0, 0];
  const prevRounds = continuing ? G.roundsPlayed : 0;

  const all = [];
  for (let a = 0; a <= 6; a++) for (let b = a; b <= 6; b++) all.push([a, b]);
  // Use daily seed so both async players face the same tile distribution
  const dailySeed = getDailySeed();
  // Mix round number into seed so each round within the match is distinct but still deterministic per day
  const roundSeed = dailySeed + (continuing ? prevRounds : 0);
  seededShuffle(all, mulberry32(roundSeed));
  const h0 = all.slice(0, 7), h1 = all.slice(7, 14), yard = all.slice(14);

  // First player: highest double, else highest pip sum
  let first = 0, best = -1;
  for (const [h, p] of [[h0, 0], [h1, 1]])
    for (const t of h) if (t[0] === t[1] && t[0] > best) { best = t[0]; first = p; }
  if (best === -1) { best = -1;
    for (const [h, p] of [[h0, 0], [h1, 1]])
      for (const t of h) if (t[0] + t[1] > best) { best = t[0] + t[1]; first = p; }
  }

  // Bug fix: initialise lastSide so render() scroll has a defined value before any tile is placed
  G = {
    h: [h0, h1], yard, board: [], L: null, R: null, cur: first, sel: null,
    sc: prevSc, passes: 0, over: false, win: -1, lastSide: 'right',
    draws: [0, 0],         // tiles drawn from boneyard this round, per player
    pts: prevPts,          // cumulative match points for player 0 and player 1
    roundsPlayed: prevRounds,
    matchOver: false,
    winByEmpty: false      // true if round ended by emptying hand (vs. pip count)
  };
}

// ── Helpers ──────────────────────────────────────────────
function hasMove(p) {
  if (G.L === null) return G.h[p].length > 0;
  return G.h[p].some(t => t[0] === G.L || t[1] === G.L || t[0] === G.R || t[1] === G.R);
}

// ── Game logic ────────────────────────────────────────────
function place(side) {
  const { sel, cur } = G;
  if (sel === null) return;
  const hand = G.h[cur], tile = hand[sel];

  if (G.board.length === 0) {
    G.board.push({ t: tile, f: false });
    G.L = tile[0]; G.R = tile[1];
    G.lastSide = 'right';
  } else if (side === 'left') {
    let f;
    if      (tile[1] === G.L) { f = false; G.L = tile[0]; }
    else if (tile[0] === G.L) { f = true;  G.L = tile[1]; }
    else return;
    G.board.unshift({ t: tile, f });
    G.lastSide = 'left';
  } else {
    let f;
    if      (tile[0] === G.R) { f = false; G.R = tile[1]; }
    else if (tile[1] === G.R) { f = true;  G.R = tile[0]; }
    else return;
    G.board.push({ t: tile, f });
    G.lastSide = 'right';
  }

  hand.splice(sel, 1);
  G.sel = null; G.passes = 0;
  if (!hand.length) { endRound(cur); return; }
  nextTurn();
}

function draw() {
  if (!G.yard.length) return;
  G.h[G.cur].push(G.yard.pop());
  G.draws[G.cur]++;   // track boneyard draws for scoring penalty
  G.sel = null;
  if (!hasMove(G.cur)) { passEnd(); return; }
  render();
  if (G.cur === 1) setTimeout(ai, 500);
}

function passEnd() {
  G.sel = null; G.passes++;
  if (G.passes >= 2) { byPips(); return; }
  nextTurn();
}

function byPips() {
  const p0 = G.h[0].reduce((s, t) => s + t[0] + t[1], 0);
  const p1 = G.h[1].reduce((s, t) => s + t[0] + t[1], 0);
  G._blockedPips = [p0, p1];
  endRound(p0 < p1 ? 0 : p1 < p0 ? 1 : -1, true);
}

// ── Skill-based scoring ──────────────────────────────────────
// Win by emptying hand:  100 + opponent remaining pips - (own draws x10)  (min 100)
// Win blocked game:       50 + pip differential        - (own draws x10)  (min 50)
// Draw result:            20 pts each
// Draw penalty:          -10 per boneyard draw (already factored into base calc above)
function calcRoundPts(w, blocked) {
  const earned = [0, 0];
  if (w === -1) {
    // True draw: small consolation
    earned[0] = 20; earned[1] = 20;
  } else if (blocked) {
    const [p0, p1] = G._blockedPips;
    const diff = Math.abs(p0 - p1);
    // Winner gets 50 + pip differential, minus penalty for draws taken
    earned[w] = Math.max(50, 50 + diff - G.draws[w] * 10);
    earned[1 - w] = 0;
  } else {
    // Win by empty hand: winner earns opponent's leftover pips + 100 bonus, minus draw penalty
    const oppPips = G.h[1 - w].reduce((s, t) => s + t[0] + t[1], 0);
    earned[w] = Math.max(100, 100 + oppPips - G.draws[w] * 10);
    earned[1 - w] = 0;
  }
  return earned;
}

function endRound(w, blocked = false) {
  G.over = true; G.win = w;
  if (w !== -1) G.sc[w]++;

  const earned = calcRoundPts(w, blocked);
  G.pts[0] += earned[0];
  G.pts[1] += earned[1];
  G._roundPts = earned;   // stash for display
  G.roundsPlayed++;

  if (G.roundsPlayed >= MATCH_ROUNDS) {
    G.matchOver = true;
    saveScore(G.pts[0], 'Player 1');
  }

  render();
}
function nextTurn() { G.cur = 1 - G.cur; render(); if (G.cur === 1 && !G.over) setTimeout(ai, 650); }

// ── AI ────────────────────────────────────────────────────
function ai() {
  if (G.cur !== 1 || G.over) return;
  const hand = G.h[1];

  if (G.board.length === 0) {
    let bi = 0, bs = -1;
    hand.forEach((t, i) => { const s = t[0] + t[1] + (t[0] === t[1] ? 20 : 0); if (s > bs) { bs = s; bi = i; } });
    G.sel = bi; place('right'); return;
  }

  for (let i = 0; i < hand.length; i++) {
    const t = hand[i];
    if (t[0] === G.R || t[1] === G.R) {
      G.sel = i;
      place('right');
      return;
    }
    if (t[0] === G.L || t[1] === G.L) {
      G.sel = i;
      place('left');
      return;
    }
  }

  if (G.yard.length) { draw(); } else { passEnd(); }
}

// ── Rendering ─────────────────────────────────────────────
function makePips(n, sz) {
  const el = document.createElement('div');
  el.className = 'pips';
  el.style.width = el.style.height = sz + 'px';
  const cells = Array(9).fill(0);
  (PIPS[n] || []).forEach(([r, c]) => cells[r * 3 + c] = 1);
  const pipSz = sz < 32 ? 5 : 7;
  cells.forEach(on => {
    const d = document.createElement('div');
    if (on) { d.className = 'pip'; d.style.width = d.style.height = pipSz + 'px'; }
    el.appendChild(d);
  });
  return el;
}

function makeTile(a, b, { sel = false, faceDown = false, vert = false, sm = false, onClick = null } = {}) {
  const sz = sm ? 26 : 36;
  const el = document.createElement('div');
  el.className = 'tile' + (sel ? ' sel' : '');
  el.style.flexDirection = vert ? 'column' : 'row';

  if (faceDown) {
    el.style.cssText += `width:${sz * 2 + 8}px;height:${sz + 6}px;background:linear-gradient(135deg,#1d4ed8,#312e81);border-color:#1e3a8a;cursor:default;pointer-events:none;`;
  } else {
    el.appendChild(makePips(a, sz));
    const seam = document.createElement('div');
    seam.className = vert ? 'seam-v' : 'seam-h';
    el.appendChild(seam);
    el.appendChild(makePips(b, sz));
  }

  if (onClick) el.addEventListener('click', onClick);
  return el;
}

function mkBtn(label, bg, fn) {
  const b = document.createElement('button');
  b.className = 'act-btn';
  b.style.background = bg;
  b.textContent = label;
  b.addEventListener('click', fn);
  return b;
}

function render() {
  const { h, yard, board, L, R, cur, sel, sc, over, win, pts, roundsPlayed, matchOver } = G;

  // Status
  const st = document.getElementById('status');
  if (matchOver) {
    const playerWon = pts[0] > pts[1];
    const tied = pts[0] === pts[1];
    st.textContent = tied ? 'Match over — Draw!' : playerWon ? 'Match over — You win!' : 'Match over — Player 2 wins!';
    st.style.background = tied ? 'rgba(0,0,0,.35)' : playerWon ? 'rgba(22,163,74,.4)' : 'rgba(239,68,68,.2)';
  } else if (over) {
    const ptsEarned = G._roundPts ? G._roundPts[0] : 0;
    const roundLabel = `Round ${roundsPlayed}/${MATCH_ROUNDS}`;
    if (win === 0) st.textContent = `You win! +${ptsEarned} pts  (${roundLabel})`;
    else if (win === 1) st.textContent = `Player 2 wins  (${roundLabel})`;
    else st.textContent = `Draw! +${ptsEarned} pts each  (${roundLabel})`;
    st.style.background = win === 0 ? 'rgba(22,163,74,.4)' : win === 1 ? 'rgba(239,68,68,.2)' : 'rgba(0,0,0,.35)';
  } else {
    st.textContent = cur === 0 ? 'Your turn — tap a tile' : 'Player 2 is thinking…';
    st.style.background = 'rgba(0,0,0,.25)';
  }
  document.getElementById('bc').textContent = yard.length;
  // Show round tally and cumulative match points for player
  document.getElementById('sc').textContent = `Rounds ${sc[0]}-${sc[1]}  |  Score: ${pts[0]}`;
  // Show daily seed so async opponents can confirm they are on the same distribution
  document.getElementById('daily-seed-display').textContent = `Seed: ${getDailySeed()}`;

  // Board
  const bd = document.getElementById('board');
  bd.innerHTML = '';
  if (!board.length) {
    const x = document.createElement('div');
    x.style.cssText = 'color:rgba(74,222,128,.25);font-size:13px;padding:0 40px;white-space:nowrap;';
    x.textContent = '— place the first tile —';
    bd.appendChild(x);
  } else {
    const le = document.createElement('span');
    le.className = 'end-label'; le.textContent = L;
    bd.appendChild(le);

    board.forEach(({ t, f }) => {
      const [a, b] = f ? [t[1], t[0]] : t;
      const el = makeTile(a, b, { vert: t[0] === t[1], sm: true });
      el.classList.add('dead');
      bd.appendChild(el);
    });

    const re = document.createElement('span');
    re.className = 'end-label'; re.textContent = R;
    bd.appendChild(re);
  }
  requestAnimationFrame(() => { const s = document.getElementById('bscroll'); s.scrollLeft = G.lastSide === 'left' ? 0 : s.scrollWidth; });

  // Opponent hand (face-down unless game over)
  const op = document.getElementById('opp');
  op.innerHTML = '';
  h[1].forEach(t => op.appendChild(makeTile(t[0], t[1], { faceDown: !over })));

  // Player hand
  const p1el = document.getElementById('p1');
  p1el.innerHTML = '';
  const myTurn = cur === 0 && !over;
  h[0].forEach((t, i) => {
    const playable = board.length === 0 || t[0] === L || t[1] === L || t[0] === R || t[1] === R;
    const el = makeTile(t[0], t[1], {
      sel: sel === i,
      onClick: myTurn && playable ? () => { G.sel = G.sel === i ? null : i; render(); } : null
    });
    if (myTurn && !playable) el.classList.add('dim');
    if (!myTurn || (!playable && sel !== i)) el.style.cursor = 'default';
    p1el.appendChild(el);
  });

  // Action buttons
  const ac = document.getElementById('acts');
  ac.innerHTML = '';

  if (matchOver) {
    ac.appendChild(mkBtn('New Match', '#16a34a', () => { G.matchOver = false; newGame(); render(); if (G.cur === 1) setTimeout(ai, 700); }));
  } else if (over) {
    ac.appendChild(mkBtn('Next Round', '#16a34a', () => { newGame(); render(); if (G.cur === 1) setTimeout(ai, 700); }));
  } else if (cur === 0) {
    if (sel !== null) {
      const t = h[0][sel];
      if (board.length === 0) {
        ac.appendChild(mkBtn('Place Tile', '#d97706', () => place('right')));
      } else {
        if (t[0] === L || t[1] === L) ac.appendChild(mkBtn('← Left', '#d97706', () => place('left')));
        if (t[0] === R || t[1] === R) ac.appendChild(mkBtn('Right →', '#d97706', () => place('right')));
      }
    } else if (!hasMove(0)) {
      if (yard.length) ac.appendChild(mkBtn('Draw Tile', '#2563eb', draw));
      else             ac.appendChild(mkBtn('Pass', '#6b7280', passEnd));
    }
  }
}

// ── Init ──────────────────────────────────────────────────
function initGame() {
  newGame();
  render();
  if (G.cur === 1) setTimeout(ai, 700);
}
</script>
